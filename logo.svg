<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8ff00"/>
      <stop offset="100%" style="stop-color:#b8cc00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Trackpad outline -->
  <rect x="96" y="120" width="320" height="240" rx="24" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Click divider line -->
  <line x1="96" y1="290" x2="416" y2="290" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Left click zone -->
  <rect x="96" y="290" width="160" height="70" rx="0" fill="none" stroke="#2a2a2a" stroke-width="1" opacity="0.5"/>
  <!-- Touch point dot -->
  <circle cx="256" cy="205" r="12" fill="url(#accent)" opacity="0.9"/>
  <!-- Ripple rings -->
  <circle cx="256" cy="205" r="28" fill="none" stroke="#e8ff00" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="205" r="44" fill="none" stroke="#e8ff00" stroke-width="1" opacity="0.2"/>
  <!-- Wifi/signal icon at bottom right corner -->
  <g transform="translate(370, 420)" fill="#e8ff00" opacity="0.7">
    <circle cx="0" cy="0" r="4"/>
    <path d="M-10,-12 Q0,-22 10,-12" fill="none" stroke="#e8ff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-18,-22 Q0,-38 18,-22" fill="none" stroke="#e8ff00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
